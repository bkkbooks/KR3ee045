body:
  text: 卷下針經井滎歌訣足少陽膽之經陽干注腑陰乾注臟甲日甲與己合膽引氣行木原在寅甲日甲戌時膽為井金丙子時小腸為滎水戊寅時胃為俞木迸過本原丘墟穴木原在寅庚辰時大腸為經火壬午時膀胱為合土甲申時氣納三焦謂諸甲合還原化本膽竅陰為井膽中行脅痛煩熱又頭痛喉痹舌乾並臂痛一針難步卻須行小腸前谷為滎屬小腸喉痹頷腫嗌咽乾頸項臂痛汗不出目生翳膜併除痊胃陷谷胃俞節後邊腹痛腸鳴痎瘧纏面目浮腫汗不出三分針入得復痊膽原丘墟為膽是為原胸脅滿痛瘧安纏腋腫髀樞腿痠痛目生翳膜併除痊大腸陽谿為經表腕邊顛狂喜笑鬼神言心煩目赤頭風痛熱病心驚針下痊膀胱委中合穴膕紋中腰脊沉沉溺失頻髀樞痛及膝難屈取其經血使能平足厥陰肝之經乙日乙與庚合肝引血行乙日乙酉時肝為井木丁亥時心為滎火己丑時脾為俞土辛卯時肺為經金癸巳時腎為合水乙未血納包絡肝大敦為井注肝家心疼腹脹陰汗多中熱屍厥如死狀血崩臍痛用針加心少府心滎木節中少氣悲憂虛在心心痛狂顛實譫語寒熱胸中便下針脾太白脾俞骨下分身熱腹脹血便膿吐逆霍亂胸中痛下針一刺得安寧肺經渠肺經熱在胸掌後寸口脈陷中熱病喘疼心吐逆禁灸神針有大功腎陰谷腎合膝後分腳痛難移好用針小腹急痛並漏下小便黃赤建時尋手太陽小腸之經丙日丙與辛合小腸引氣行火原在子火入水鄉丙日丙申時小腸為井金戊戌時胃為滎水庚子時大腸為俞木並過本原腕骨穴故火原在子壬寅時膀胱為經火甲辰時膽為合土丙午時氣納三焦小腸少澤元本手太陽井注喉痹舌生瘡臂痛咳嗽連項急目生翳膜一針康胃內庭胃滎本陷中四肢厥逆滿腹疼口渴牙痛依穴用使下神針便去根大腸三間為俞本節後喉痹咽哽齒齲痛胸滿腸鳴洞泄頻唇焦氣喘針時定小腸原腕骨為原手踝中熱病相連汁出頻目中淚出兼生翳偏枯臂舉只神針膀胱崑崙為經外後跟腰疼腳重更難行頭疼吐逆並腹脹小兒癇搐一齊針膽陽陵泉穴膽合間腰伸不舉臂風癇半身不遂依針刺膝勞冷痹下針安手少陰心之經丁日丁與壬合心引血行丁日丁未時心為井木己酉時脾為滎火辛亥時肺為俞土癸丑時腎為經金乙卯時肝為合水丁巳時血納包絡心少衝為井是心家熱病煩滿上氣多虛則悲驚實喜笑手攣臂痛用針加脾大都脾滎本書中熱病相連是逆行腹滿煩悶並吐逆神針一刺即時寧肺太淵肺俞掌後尋嘔吐咳嗽腹膨膨眼目赤筋白翳膜心疼氣上一般針腎復溜腎經魚肚中面目䀮䀮喜怒停腹內雷鳴並脹滿四肢腫痛刺時靈肝曲泉肝合跗骨中女人血瘕腹腫疼身熱喘中氣勞病足疼泄利又便膿足陽明胃之經戊日戊與癸合胃引氣行土原在戊戊日戊午時胃為井金庚申時大腸為滎水壬戌時膀胱為俞木井過本原衝陽穴故土原在戊甲子時膽為經火丙寅時小腸為合土戊辰時氣納三焦胃厲兌為開主胃家屍厥口噤腹腸滑汗病不出如瘧狀齒痛喉痹針刺佳大腸二間庚滎本節中喉痹鼻衄在心驚肩背疼時依此用下針牙痛更無根膀胱束骨壬俞本節中耳聾項急本穴尋惡風目眩並背痛針之必定有神功胃原衝陽為原動脈中偏風口眼注牙痛寒熱往來如瘧狀建時取效有同神膽陽輔膽經四寸間筋攣骨痛足腫寒風痹不仁依此用神針一刺不須難小腸少海為合肘上中寒熱風腫頂頭疼四肢無力難舉步建時針刺有神靈足太陰脾之經己日甲與己合脾引血行己日己巳時脾為井木辛未時肺為滎火癸酉時腎為俞土乙亥時肝為經金丁丑時心為合水巳卯時血納包絡脾隱白為井足太陰腹脹喘滿吐交橫鼻衄滑腸食不化月經不止血山崩肺魚際為滎熱汗風咳嗽頭痛痹主胸目眩少氣咽乾燥嘔吐同針有大功腎太谿腎俞內踝下足厥心疼嘔吐涎咳嗽上氣並脈短神針到後病伏潛肝中封為經內踝前振寒痎瘧色蒼蒼臍腹痛時兼足冷寒疝相纏針下康心少海心合曲節間齒疼嘔逆滿胸心頭項痛時涕與笑用針一刺管驚人手陽明大腸之經庚日庚與乙合大腸引氣行金原在申庚日庚辰時大腸為井金壬午時膀胱為滎水甲申時膽為俞木井過本原合谷穴金原在申也丙戌時小腸為經火戊子時胃為合土庚寅時氣納三焦大腸商陽為井大腸中次指指上氣注胸喘逆熱病並牙痛耳聾寒熱目赤紅膀胱通谷為滎本節遊頭重鼻衄項筋收目視䀮䀮胸脹滿食飲不化即時休膽臨泣膽前節後邊中滿缺盆腫項咽月事不調依此用氣噎如瘧當時安大腸原合谷為原歧骨中痹痿漏下熱生風目視不明並齒痛牙關口噤一針功小腸陽谷為經側腕中癲疾狂走妄言驚熱病過時汗不出耳聾齒痛目眩針胃三里胃合膝下分諸般疾病一般針須去日上加時下方知世上有名人手太陰肺之經辛日丙與辛合肺引血行辛日辛卯時肺為井木癸巳時腎為滎火乙未時肝為俞土丁酉時心為經金己亥時脾為合水辛丑時血納包絡肺少商肺井注心中寒熱咳逆喘脹沖飲食不下咽喉痛三稜針刺血為功腎然谷腎滎內踝尋喘呼少氣足難行小兒臍風並口噤神針並灸得安寧肝太衝肝俞本節後腰引少腹小便膿淋瀝足寒並嘔血漏下女子本中疼心靈道為經掌後真心痛肘攣悲恐驚暴喑即使難言語建時到後即宜針脾陰陵泉穴脾之合腹堅喘逆身難臥霍亂疝瘕及腰疼小便不利針時過足太陽膀胱之經壬日丁與壬合膀胱引氣行水原在午水入火鄉壬日壬寅時膀胱為井金甲辰時膽為滎水丙午時小腸為俞木並過本原京骨穴水原在午水入火鄉故壬子午相交也戊申時胃為經火庚戌時大腸合土壬子時氣納三焦還原化本膀胱至陰為井是膀胱目生翳膜頭風狂胸脅痛時依法用小便不利熱中傷膽俠谿膽滎小節中胸脅脹滿足難行寒熱目赤頸項痛耳聾一刺便聞聲小腸後谿為俞節陷中寒熱氣瘧目生筋耳聾鼻衄並喉痹肘臂筋攣同用針膀胱原京骨為原肉際間䯒酸膝痛屈伸難目眥內赤頭頸強寒瘧腰疼針下安胃解谿穴是胃之經腹脹䯒腫腳轉筋頭痛霍亂面浮腫大便下重也同針大腸曲池為合肘外陷半身不遂語難言肘中痛急伸無力喉痹針下也痊然手少陽三焦之經三焦與包絡合為表裡壬子時三焦關衝為井金甲寅時為滎水丙辰時為俞木並過本原陽池戊午時為經火庚申時為合土壬戌時氣入行金三焦之井號關衝目生翳膜注頭痛臂肘痛攻不能舉喉痹針刺取其靈水液門為滎次陷中驚悸癇熱共頭痛目赤齒血出不定三稜針刺即時靈木中渚為俞節後尋熱病頭疼耳不聞目生翳膜咽喉痛針入三分時下明三焦原陽池為原腕表中寒熱如瘧積心胸臂痛身沉難舉步一針當面有神功火支溝為經腕後真熱病臂肘腫兼疼霍亂吐時並口噤下針得氣使醒醒土天井為合肘外尋風痹筋攣及骨疼咳嗽不食並驚悸心胸氣上即時針手厥陰心主包絡之經心主與三焦為表裡癸丑時包絡為井木乙卯時為滎火丁巳時為俞土己未時為經金辛酉時為合水木中衝為井厥陰心掌中煩熱及頭疼熱病煩悶汗不出舌強針時得自平火勞宮心滎手掌中中氣攣痹口中腥狂笑顛疾同日用氣粗喘逆也須寧土大陵心俞腕後尋喜笑悲哀氣上衝目赤小便如赤色狂言頭痛建時中金間使心經掌後間心痛嘔逆惡風寒熱時咽痛並驚悸神針和忤也須安水曲澤為合肘里存心疼煩悶口乾頻肘臂筋攣多嘔血呼吸陰陽去病根足少陰腎之經癸日戊與癸合腎引血行癸日癸亥時腎為井木乙丑時肝為滎火丁卯時心為俞土己巳時脾為經金辛未時肺為合水癸酉時血納包絡
