body:
  text: 卷上流注指微針賦以針醫訣式流注指微為識疾居榮衛榮者血也衛者氣也由腸胃受谷化血氣所為也上焦出氣以溫分肉而養筋通腠理中焦出氣如露上注溪谷而滲孫脈津液和調變化而為血血和則孫脈先滿乃注絡脈皆盈乃注於經脈陰陽以張因息乃行行有紀綱周有道理與天合同不得休止切而調之調護失度致生其疾疾者百病之總名也百病之始皆因風寒暑溫飢飽勞逸而得之或起於陰或起於陽所傷各異虛實不同或著孫脈或著絡脈或著經脈或著於沖任脈或著於腸胃之膜原邪氣浸淫不可勝論扶救者針救疾之功調虛實之要九針最妙各有所宜熱在頭身宜鑱針肉分氣滿宜圓針脈氣虛渺宜鍉針瀉熟出血發泄固疾宜鋒針破癰腫出膿血宜鈹針調陰陽去暴痹宜圓利針治經絡中病痹宜毫針痹深居骨節腰脊腠理之間宜長針虛風舍於骨節皮膚之間宜大針觀虛實與肥瘦經云虛則補之實則瀉之不實不虛以經取之若虛實不明投針有失聖人所謂虛虛實實若明此則無損不足益有餘之過觀肥瘦者用針之法必先觀其形之肥瘦方明針刺之淺深若以身中分寸肥與瘦同用是謂深淺不得返為大賊也故肥人刺深瘦人刺淺以與本臟所屬部分齊平為期所以無過不及之傷也辨四時之淺深四時者所以分春秋夏冬之氣所在以時調之也春氣在毫毛夏氣在皮膚秋氣在分肉冬氣在筋骨經云春夏刺淺秋冬刺深各以其時為則又肥人宜深刺之瘦人宜淺刺之取穴之法但分陰陽而溪谷陰者陰氣也陽者陽氣也謂陽氣起於五指之表陰氣起於五指之裡也肉之大會為谷肉之小會為溪分肉之間溪谷之會以行榮衛以會大氣溪谷有三百六十五穴會亦應一歲故取穴之法分其陰陽表裡部分溪谷遠近同身寸取之舉臂拱手直立偃側皆取穴法也逐穴各有所宜迎隨逆順須曉氣血而升沉經云迎隨者要知榮衛之流行經脈之往來也隨其經逆順而取之靈樞曰瀉者迎之補者隨之若能知迎知隨令氣必和和氣之方必通陰陽升降上下源流手之三陰從臟走至手手之三陽從手走至頭足之三陽從頭下至足足之三陰從足上走至腹絡脈傳注周流不息故經脈者行血氣通陰陽以榮於身者也本論云夫欲用迎隨之法者要知經絡逆順淺深之分諸陽之經行於脈外諸陽之絡行於脈內諸陰之經行於脈內諸陰之絡行於脈外仍各有所守之分故知皮毛者肺之部肌肉者脾之本筋者肝之合骨髓者腎之屬血脈者心之分各刺其部無過其道是謂大妙迎而奪之有分寸隨而濟之有淺深深為太過能傷諸經淺為不及安去諸邪是以足太陽之經刺得其部迎而六分隨而一分足太陽之絡迎而七分隨而二分手太陽之經迎而七分隨而二分手太陽之絡迎而九分隨而四分手陽明之經迎而九分隨而四分手陽明之絡迎而八分隨而三分足陽明之經迎而一寸隨而五分足陽明之絡迎而六分隨而一分手少陽絡迎而七分隨而二分足少陽經迎而八分隨而三分足少陽絡迎而一寸隨而五分手太陰經迎而九分隨而四分手太陰絡迎而七分隨而二分足太陰經迎而一寸隨而五分足太陰經迎而八分隨而三分手少陰經迎而七分隨而二分手少陰絡迎而六分隨而一分足少陰經迎而六分隨而一分足少陰絡迎而一分隨而五分手厥陰經迎而七分隨而二分手厥陰絡迎而六分隨而一分足厥陰經迎而八分隨而三分足厥陰絡迎而九分隨而四分斯皆經絡相合補生瀉成不過一分針入貴速既入徐進針出貴緩急則多傷明須慎之勿為殆事男子左瀉右補女子右瀉左補轉針迎隨補瀉之道明於此矣原夫指微論中賾義成賦指微論三卷亦是何公所作探經絡之賾原針刺之理明榮衛之清濁別孔穴之部分然未廣傳於世今於論內自取其義以成此賦知本時之氣開說經絡之流注本論云流者行也注者往也流謂氣血之流行也一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸如流水走蟻涓涓不息不可暫止又云流而為榮衛彰而為顏色發而為音聲速則生熱遲則生寒結而為瘤贅陷而為癰疽故知流者不可止若人誤中則有顛倒昏悶之疾又云注者住也謂十二經絡各至本時皆有虛實邪正之氣注於所括之穴所謂得時謂之開失時謂之合氣開當補瀉氣閉忌針刺聖人深慮此者恐人勞而無功豈可昧氣開流注之道哉其氣開注穴之法七韻中說之矣每披文而參其法篇篇之理可尋覆經而察其言字字之明諭其隱皆知虛實總附夫披文覆經者學者之不情也既窮其理賾其義知其根得其源以見聖人之心乎觀何公作流注之賦玄辭妙話可謂達理非是自炫也移疼住痛如有神針下獲效得其針刺之要移疼住痛獲效如神暴疾沉疴至危篤刺之勿誤沉疴久病虛弱之人忽暴感疾於榮衛傳於臟腑其病必危篤而重也明者是時深慮損益慎勿輕勿自恃聰俊當須察其何經所苦補瀉針刺去之勿誤也詳夫陰日血引值陽氣流賈氏云陽日氣先脈外血後脈內陰日血先脈外氣後脈內交貫而行於五臟五腑之中各注井滎俞經合五穴共五十穴惟三焦受十經血氣次傳包絡又各注五穴通前十二經共六十穴才合得十六難內六十首也越人言三部九候各有頭首也及素問言六十首今世不傳既言不傳其文不載六十首字也故聖人留此六十首法令後人穿鑿也余以所過為原六穴即便是陰陽二氣出入門戶也則陽脈出行二十五度陰脈入行二十五度則皆會此六穴中出入也其五臟五腑收血化精合處便是逐經原氣也其餘精者助其三焦受十經精氣則以養心包絡始十二經血氣遍行也如一經精氣不足則便成病也既然有病即不依此行度也至今諸經失時又更引毒氣遍行所流到處即各見本經脈候或大或小或浮或沉病人或寒或熱或輕或重因證取之耳口溫針暖凡下針先須口內溫針令暖不唯滑利而少痛亦借己之和氣與患者榮衛無寒暖之爭便得相從若不先溫針暖與血氣相逆寒溫交爭而成瘡者多矣牢濡深求經云實之與虛者牢濡之意氣來實牢者為得濡虛者為失凡欲行其補瀉即詳五臟之脈及所刺穴中如氣來實牢者可瀉之虛濡者可補之也諸經十二作數絡脈十五為周手足各有三陰三陽之脈合為十二經脈每一經各一絡脈余有陽蹺之絡陰蹺之絡脾之大絡合為十五絡脈周者謂十二經十五絡二十七氣周流於身者也陰俞六十臟主臟為五臟肝心脾肺腎並心包之脈合之有六併兼四形臟也俞謂井滎經合非皆俞也然井滎俞經合者肝之井大敦穴也滎行間穴也俞太衝穴也經中封穴也合曲泉穴也心之井少衝穴也滎少府穴也俞神門穴也經靈道穴也合少海穴也脾之井隱白穴也滎大都穴也俞太白穴也經商丘穴也合陰陵穴也肺之井少商穴也滎魚際穴也俞太淵穴也經經渠穴也合尺澤穴也腎之井湧泉穴也滎然谷穴也俞太谿穴也經復溜穴也合陰谷穴也心包之井中衝穴也滎勞宮穴也俞大陵穴也經間使穴也合曲澤穴也五臟之俞各有五則五五二十五俞井心包絡五俞共三十以左右見言之六十俞穴也陽穴七十二腑收腑謂六腑非兼九形腑也穴俞穴也亦謂井滎俞原經合也肝之腑膽膽之井者竅陰穴也滎俠谿穴也俞臨泣穴也原丘墟穴也經陽輔穴也合陽陵泉穴也心之腑小腸小腸之井者不澤穴也滎前谷穴也俞後谿穴也原腕骨穴也合小海穴也脾之腑胃胃之井者厲兌穴也滎內庭穴也俞陷谷穴也原衛陽穴也經解谿穴也合三里穴也肺之腑大腸大腸之井者商陽穴也滎二間穴也俞三間穴也原合谷穴也經陽谿穴也合曲池穴也腎之腑膀胱膀胱之井者至陰穴也滎通谷穴也俞束骨穴也原京骨穴也經崑崙穴也合委中穴也心包之腑三焦三焦之井者關衝穴也滎液門穴也俞中渚穴也原陽池穴也經支溝穴也合天井穴也如是六腑之俞各有六則六六三十六俞以左右脈共言之則七十有二俞穴也取穴部分見於井滎圖備說刺陽經者可臥針而取衛者屬陽皮毛之分當臥針而刺之若深刺傷陰分傷榮氣也奪血絡者先俾指而柔奪血絡者取榮氣也榮氣者經隧也靈樞曰經隧者五臟六腑之大絡也故言血絡凡刺之者先以左手捻按所刺之穴候指下氣散方可下針取榮家之氣不能損衛氣也經云刺榮無傷衛刺衛無傷榮也呼為迎而吸作補瀉者迎之補者隨之有餘則瀉不足則補瀉者吸則內針無令氣散靜以久留無令邪布後呼盡乃去大氣皆出是名曰瀉補者捫而循之切而散之推而按之彈而弩之抓而下之外引其門以閉其神呼盡內針靜以久留以氣至為故候吸引針氣不得出各在其處推合其門令神氣存大氣留止故名曰補凡善治者察其所痛以知病有餘不足當補則補當瀉則瀉無逆天時是謂至治之妙逆為鬼而從何憂逆者謂當刺之日與病五行相行遞為鬼賊而不順也從者五臟之氣與日相和而不相侵凌也凡刺之理當擇吉日與本病之臟腑各無侵凌刑制下針順從而何憂哉淹疾延患著灸之由若病有久淹因寒而虛或陰證多寒或是風寒濕痹腳氣之病或是上實下虛厥逆之疾男子勞傷婦人血氣之屬並可用灸亦有不可灸者近髓之穴陽證之病不可灸也躁煩藥餌而難拯必取八會躁煩熱盛在於內者宜取八會之氣穴也謂腑會太倉中腕穴臟會季脅章門穴筋會陽陵泉穴髓會絕骨穴血會膈俞穴骨會大杼穴脈會太淵穴氣會三焦膻中穴此是八會穴也癰腫奇絡而畜邪先由砭瘳經云病人脈隆盛入於八脈而不環周十二經亦不能拘之其受邪氣蓄積腫熱宜砭刺出血古者以砭石為針山海經曰高氏之山有石如玉可以為針即砭石也今人以鈹針代之也況乎甲膽乙肝丁心壬水甲膽乙肝者謂五臟五腑拘之十干陽干主腑陰乾主臟故天元冊又曰膽甲肝乙小腸丙心丁胃戊脾己大腸庚肺辛膀胱壬腎癸五臟五腑收血化精合處便是三焦包絡二經元氣也合為十二經遍行也賈氏各分頭首十日一終運行十干皆以五子建元日時為頭也生我者號母我生者名子夫五行者在人為五臟注穴為井滎俞經合相合為夫妻我克者為七傳克我者為鬼賊我生者為子生我者為母也春井夏滎乃邪在秋經冬合乃刺矣此言逐回時取井滎之法也假令春木旺刺井夏火旺刺滎季夏土旺刺俞秋金旺刺經冬水旺刺合四時刺法依此推之以瀉逐時所勝之邪毒者也聖人所謂因其時而取之以瀉邪氣出也犯禁忌而病復禁忌者非惟人神所在也謂大飢大渴大寒大熱大飽大醉大虛大竭大勞大困皆為針家之禁忌若虛實不分淺深不及犯觸人神顛倒四時其病愈而必復切須誡之誡之用日衰而難已本論云病於當日之下灸五行之刑制者其病克而難愈也謂心病遇庚日肝病遇辛日脾病遇乙日肺病遇丁日腎病遇己日小腸病遇壬日大腸病遇丙日胃遇甲日膽遇庚日膀胱遇戊日斯皆率義正氣日下受制而氣衰刺病難愈故也孫絡在於肉分血行出於支里孫絡小絡也謂絡之支別也行於分肉之間有血留止刺而去之無問脈之所會悶昏針運經虛補絡須然本論云若學人深明氣血往來取穴部分不差補瀉得宜必無針暈昏倒之疾或忽忙之際畏刺之人多針則傷壯者氣行自己怯者當速救療假令針肝經感氣運以補肝經合曲泉穴之絡假令針肝絡血運以補本經曲泉穴之經針入復甦效如起死他皆仿此疼實癢虛瀉子隨母要指病之虛實者癢則為虛痛者為實刺法云虛則補其母實則瀉其子假令肝臟實瀉肝之榮行間穴屬火是子肝臟虛補肝之合曲泉穴屬水是母凡刺只取木經井滎俞經合五行子母補瀉此乃大要也想夫先賢迅效無出於針經今人愈疾豈離於醫法古之治疾特論針石素問先論刺後論脈難經先論脈後論刺刺之與脈不可偏廢昔之越人起死華佗愈躄非有神哉皆此法也離聖久遠後學難精所以針之玄妙罕聞於世今時有疾多求醫命藥用針者寡矣徐文伯瀉孕於苑內斯由其速昔宋太子性善醫書出苑見一有孕婦人太子自為診之是一女令徐文伯亦診之乃一男一女太子性急欲剖腹視之文伯因自請針之令落於是瀉足三陰交補手陽明合谷胎應針而落果如文伯之言也範九思療咽於江夏聞見言稀傳曰嘉祐中有太傅程公守任於江夏因母之暴患咽中有癰卒然而長寒氣不通命醫者止可用藥治之勿施針以損之醫曰咽中氣尚不通豈能用藥藥即下之豈能卒效故眾醫不敢措治尋有醫博範九思云有藥須用未使新筆點之癰疽即便差公遂取新筆與之九思乃以點藥上癰藥到則有紫血頓出漸氣通而瘥公曰此達神聖之妙矣公命九思飲而求其方九思大笑曰其患是熱毒結於喉中塞之氣不宣通病以危甚公堅執只可用藥不可用針若從公意則必誤命若不從公意固不能施治九思當日曾以小針藏於筆頭中妄以點藥乃針開其癰而效也若非如此何如紫血頓下也公方省而歡曰針有劫病之功驗於今日古人云為將不察士卒之能否則不能決勝為醫不察藥性之主治則不能便瘥文將無深謀遠慮則無必勝醫無先機遠見治無必效也大抵古今遺蹟後世皆師昔聖人留軌範使後人仿學不可獨強也況於針術隱奧難究妙門出乎其類者今之世誰能之故聖人云不可不遵先聖遺文也王纂針魅而立康獺從被出傳曰王纂少習醫方尤精針石遠近知名嘉祐中縣人張方女因暮宿於廣陵廟中下有一物假作其壻因被魅感而病纂為治之一針有一祟從女被中走出而病愈矣秋夫療鬼而獲效魂免傷悲昔宋徐熙字秋夫善醫方為丹陽令常聞鬼神吟呻甚悽苦秋夫曰汝是鬼何須知此答曰我患腰病死雖為鬼痛苦尚不可忍聞君善醫願相救濟秋夫曰吾聞鬼無形何由措置鬼云縛草作人子依之但取孔穴針之秋夫如其言為針腰俞二穴肩井二穴設祭而埋之明日見一人來謝曰蒙君醫療復為設祭病今已愈感惠實深忽然不見公曰夫鬼為陰物病由告醫醫既愈矣尚能感激況於人乎鬼姓斛名斯既而感指幽微用針直訣此皆指微論中用針幽微之直訣也竅齊於筋骨皮肉刺要竅者穴也齊者淺深之宜也經曰刺皮無傷骨刺骨無傷髓病有浮沉刺有淺深各至其理無過其道過則傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟故生大病痛察於久新腑臟寒熱痛者病也夫人病有久新臟病腑病寒熱虛實宜細詳審調針形短長鋒類不等窮其補瀉各隨病所宜用之接氣通經短長依法本論曰夫欲取偏枯久者榮衛諸疾多是愈而復作者由氣不接而經不通流雖有暫時之塊客氣勝真病當未愈也當此乃上接而下引呼吸多少經脈長短各有定數之法手三陽接而九呼過經四寸乎三陰接而七呼過經五寸足之三陽接而一十四呼過經四寸足之三陰接而一十二呼過經五寸重者倍之吸亦同數此接氣通經呼吸長短之法也裡外之絕羸盈必別夫五臟裡外者謂心肺在鬲上通於天氣也心主於脈肺主於氣外華榮於皮膚故言外也腎肝在下通於地氣以藏精血實於骨髓心肺外絕則皮聚毛落腎肝內絕則骨痿筋緩其時學者不能別裡外虛實致使針藥誤投所以實實虛虛損不足益有餘如此死者醫殺之耳勿刺大勞使人氣亂而神隳禁刺論曰無刺大勞人勞則喘息汗出裡外昏越故氣耗亂神隳散也慎妄呼吸防他針昏而閉血呼吸者使陰陽氣行流上下經歷五臟六腑若針刺妄行呼吸陰陽交錯則針昏閉血氣不行也又以常尋古義由有藏機遇高賢真趣則超然得悟逢達人示教則表我扶危先賢之書文理幽深隱義難窮或字中隱義或假令一隅妙要難窮遇高達之士方得其趣不可穿鑿男女氣脈行分時合度本論云夫男女老幼氣候不同春夏秋冬寒暑各異春氣生而脈氣緩夏暑熱而脈行速秋氣燥而脈行急冬氣寒而脈凝澀小兒之脈應春壯年之脈應夏四十以上如秋六十以後如冬其病有寒熱脈有遲速一一參詳不可一概與天同度矣難經云一呼脈行三寸一吸脈行三寸者平人脈法也微抱病之人皆失天之度地之紀脈之用不可與平人脈相合也其診取法當以一息五至為與天同度不及應春不及應冬太過應秋太過應夏應春冬者宜留針待氣至應秋夏者呼吸數畢便宜去針此之謂也養子時克注穴必須依養子時克注穴者謂逐時干旺氣注臟腑井滎之法也每一時辰相生養子五度各注井滎俞經合五穴晝夜十二時氣血行過六十俞穴也每一穴血氣分得一刻六十分六釐六毫六絲六忽六杪此是一穴之數也六十穴共成百刻要求日下井滎用五子建元日時取之設令甲日甲戌時膽統氣初出竅陰穴為井木流至小腸為滎火氣過前谷穴注至胃為俞土氣過陷谷穴又並過本原丘墟穴但是六腑各有一原穴則不繫屬井滎相生之法即是陰陽二氣出入門戶也行之大腸為經金氣過陽谿穴所入膀胱為合水氣入委中穴而終此是甲戌時木火土金水相生五度一時辰流注五穴畢也他皆仿此今詳定療病之宜神針法式廣搜難素之秘文密辭深考諸家之肘函妙臆故稱瀘江流注之指微以為後學之規則流注經絡井滎說夫流注者為刺法之深源作針術之大要是故流者行也注者住也蓋流者要知經脈之行流也注者謂十二經脈各至本時皆有虛實邪正之氣注於所括之穴也夫得時謂之開失時謂之合夫開者針之必除其病合者刺之難愈其疾可不明此二者乎況經氣內干五臟外應支節針刺之道經絡為始若識經脈則諸行氣部分脈之短長血氣多少行之逆順祛逐有過補虛瀉實則萬舉萬痊若夫經脈之源而不知邪氣所在而不辨往往病在陽明反攻少陰疾在厥陰卻和太陽遂致賊邪未除本氣受弊以此推之經脈之理不可不通也昔聖人深慮此者恐後人勞而少功也廣因閒暇之際爰取前經以披舊典緣柯摘葉採摭精華以明流注之幽微庶免討尋之倦怠不揆荒拙列圖於後凡我同聲之者見其違闕改而正之庶行之久遠而無弊焉不亦宜乎平人氣象論經隧周環圖經脈一周於身內長一十六丈二尺人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸計二百七十定息氣可環周然晝五十榮衛以一萬三千五百息則氣脈都行八百一十丈如是則應天常度脈氣無不及太過氣象平調故曰平人也凡刺之理經脈為始經脈者所以能決死生處百病調虛實不可不通也夫經氣者內干五臟而外絡支節其浮氣不循經者為衛氣精專行於經隧者為榮氣陰陽相隨外內相貫如環之無端常以平旦為紀其脈始從中焦手太陰出注於手陽明上行注足陽明下行至跗上注大趾間與足太陰合上行抵脾從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎注心外散於胸中循手心主脈出腋下臂入兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大趾間合足厥陰上行至肝從肝上注肺中復出於手太陰此榮氣之行也逆順之常榮氣之行常循其經周身之度一十六丈二尺一日一夜行八百一十丈計五十度周於身衛氣則不循其經焉晝則行陽夜行於陰行陽者行諸經行陰者行諸臟凡刺之道須衛氣所在然後迎隨以明補瀉此之謂也手太陰肺經肺脈起於中焦出於大指之端注大腸經手太陰肺之脈起於中焦在胃中脘下絡大腸環循胃口胃口謂賁門上膈屬肝從肺系橫出腋下下循臑內臂肘也行少陰心主之前下肘中尺澤穴也循臂內上骨下廉直大指日上骨內謂內側入寸口經渠穴也上魚循魚際穴也自大指本節後內側出大指之端謂出少商穴也其支者從腕後直出次指內廉出其端手太陰少血多氣難經云脈有是動有所生病是動者氣也所生病者血也邪在氣氣為是發邪在血血為所生病是動則病肺脹滿膨而喘咳缺盆中痛甚則交兩手而瞀是為臂厥主肺所生病者咳嗽上氣喘渴煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風汗出中風小便數而欠氣虛則肩背痛寒少氣不是嘆息溺色變卒遺矢無度手陽明大腸經大腸脈起於大指之端入挾於鼻孔注胃經手陽明大腸之脈起於大指次指之端內側商陽穴也循指上廉出合谷兩骨之間上入兩筋之中循臂上廉循陽谿穴也入肘外廉曲池穴也上循臑外外前廉上肩出髃骨之前廉髃骨謂肩髃之骨乃肩端也上出柱骨之會上柱骨肩井二穴下入缺盆缺盆二穴在肩橫骨陷中絡肺下膈屬大腸其支者從缺盆直而上頸頸頭莖也貫頰入下齒中環出挾口交人中水溝穴也左之右右之左上挾鼻孔手陽明多血多氣是動則病齒痛䪼腫主津液所生病者目黃口乾鼻衄喉痹肩前臑痛大指次指痛不用也足陽明胃經足陽明胃之脈起於鼻交頞中兩目之間鼻吻深處謂之頞中旁約太陽之脈足太陽起於目眥而陽明旁行約之下循鼻外迎香穴分也上入齒中還出挾口環唇下交承漿承漿穴名也在頤前唇下宛宛中卻循頤後下廉出大迎大迎之穴在曲頷前同身寸之一寸二分陷者中循頰車頰車謂頰之牙車也言足陽明脈循出頰車而行故頰車穴在耳下曲頰之端陷中上耳前過客主人客主人在耳前起骨開口有空處循髮際至額顱其支者從大迎前下人迎人迎在結候兩旁大脈動應手是也循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣衝中氣衝穴名也其支者起胃下口循腹裡下至氣衝中而合以下髀關低伏兔下入膝臏中下循䯒外廉下足跗入中趾內間其支者下膝三寸而別以下入中指外間其支者別跗上入大趾間出其端厲兌穴也足陽明多氣多血是動則病洒洒然振寒善伸數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥本經原缺據普濟方節補足太陰脾經脾脈起於大指之端注於心中注心經足太陰脾之脈起於大趾之端循趾內側隱白穴也白肉際過核骨後太白穴之後也上內踝前廉商丘穴也上腨內魚腹也循䯒骨後交出厥陰之前上循膝股內前廉陰陵泉也入腹屬脾絡胃上膈挾咽連舌本舌根系也散舌下其支者復從胃別上膈注心中足太陰少血多氣是動則病舌本強食則吐胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用也手少陰心經心脈起於心中入掌內循小指注小腸經手少陰心之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系一本作循胃出脅其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內廉少海穴也循臂內後廉抵掌後兌骨之端神門穴也入掌內後廉循小指之內出其端少衝穴也手少陰少血多氣是動則病嗌乾心痛渴而欲欲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱也手太陽小腸經小腸脈起於小指之端斜絡於目眥注膀胱經手太陽小腸之脈起於小指之端少澤穴也循手外側上腕腕骨穴也出踝中直上循臂骨下廉陽谷穴也出肘內側兩骨之間上循臑外後廉出肩解繞肩胛交肩上入缺盆向腋絡心循咽下膈抵胃屬小腸其支者從缺盆貫頸上頰至目銳眥卻入耳中其支者別頰天容穴也上䪼抵鼻至目內眥斜絡於顴手太陽小腸之經多血少氣是動則病嗌痛頜腫不可回顧肩似拔臑似折是主液所生病者耳聾目黃頰頷腫頸肩臑肘臂外後廉痛也足太陽膀胱經膀胱脈起於目內眥至小指外側注腎經足太陽膀胱之脈起於目內眥上額交巔上其支者以巔百會也至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下會於後陰下貫臀入膕中委中穴也其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後崑崙穴也循京骨至小指外側至陰穴也足太陽膀胱之經多血少氣是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不同也足少陰腎經腎脈起於小指之下注胃中注心包足手陰腎之脈起於小指之下斜走足心湧泉穴也出然谷之下然谷穴內踝前在循內踝之後太谿穴也別入跟中以上腨內出膕內廉陰谷穴也上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中足少陰腎之經少血多氣是動則病飢不欲食面黑如炭色咳唾則有血喉鳴而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛手厥陰心包經心包脈起於胸中循小指次指出其端注三焦經手厥陰心包絡之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間太陰在上少陰在下心主在中入肘中曲澤穴也下循臂行兩筋之間太陵穴也入掌中勞宮穴也循中指出其端中衝穴也其支者別掌中循小指次指出其端交手少陽也手厥陰心包絡之脈多血少氣是動則病手心熱肘臂攣急腋腫甚則胸脅支滿心中憺憺火動面色赤喜笑不休目黃是主心包脈所生病者煩心心痛掌中熱手少陽三焦經三焦脈起於小指次指之端至目兌眥注膽經手少陽三焦之脈起於小指次指之端關衝穴也上出兩指之間液門穴也循手表腕陽池穴也出臂外兩骨之間支溝穴也上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中膻中在玉堂穴下一寸六分兩乳之間陷中是也散絡心包下膈循屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰一作顱至䪼其支者從耳後入耳中出走耳前過客主人客主人在耳前上起骨開口有空者前交頰至目銳眥手少陽三焦之脈多氣少血是動則病耳聾耳鳴渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用足少陽膽經膽脈起於目兌眥入大指循歧骨內出於端注肝經足少陽膽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸中過季脅下合髀厭中以下循髀陽出膝外廉陽陵泉也下外輔骨之前輔骨在陷下直下抵絕骨之端絕骨外端陽輔穴下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾岐骨內出其端還貫爪甲出三毛中足少陽之經多氣少血是動則病口苦善太息心脅痛不能轉側甚則面有微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小趾次趾不用足厥陰肝經肝脈起於大指聚毛之際上注肺中足厥陰肝之脈起於大指聚毛之際大敦穴也上循足跗上廉太衝穴也去內踝一寸中卦穴也上踝八寸曲泉穴也交出太陰之後上膕內廉循股陰入毛中過陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上頑顙連目繫上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺中復交於手太陰足厥陰之經少氣多血是動則病腰痛不可俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺溺癃閉
