front:
  text: 序竊以久習醫業好讀難素辭理精微妙門隱奧古今所難而不易也是以針刺之理尤為難解博而寡要勞而少功窮而通之積有萬端之廣近世指病直刺不務法者多矣近有南唐何公務法上古撰指微論三卷探經絡之源順針刺之理明榮衛之清濁別孔穴之部分然未廣傳於世又近於貞元癸酉年間收何公所作指微針賦一道敘其首云皆按指微論中之妙理先賢秘隱之樞機復增多事凡百餘門悉便於討閱者也非得難素不傳之妙孰能至此哉廣不度荒拙隨其意韻輒申短說採摭群經為之註解廣今復採難素遺文賈氏井滎六十首法布經絡往還復針刺孔穴部分鈐括圖形集成一義目之曰流注經絡井滎圖歌訣續於賦後非顯不肖之狂迷啟明何氏之用心致驗於人也自慮未備其善更祈明智乃懇續焉常山閆明廣序據普濟方補
