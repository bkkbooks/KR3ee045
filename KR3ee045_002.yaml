body:
  text: 卷中井滎俞經合部分圖凡人兩手足各有此三陽三陰之脈合為十二經脈每一經中各有井滎俞經合皆出於井入於合經云所出者為井所流者為滎所注者為俞所行者為經所入則為合井者東方春也萬物之始生故言所出為井也合者北方冬也陽氣入臟故言所入為合也故春刺井夏刺滎季夏刺俞秋刺經冬刺合者聖人所謂因其時而取之以瀉邪毒出也井滎所屬陰井木陽井金陰滎火陽滎水陰俞士陽俞木陰經金陽經火陰合水陽合土昔聖人先立井滎俞經合配象五行則以十二經中各有子母故刺法云虛則補其母實則瀉其子假令肝自病實則瀉肝之滎屬火是子若虛則補肝之合屬水是母余皆仿此若他邪相乘陰陽偏勝則先補其不足後瀉其有餘此為針醫之大要若深達洞明則為上工者也十經血氣皆出於井入於合各注井滎俞經合無依矣或曰脈有十二經又因何只言十經其餘二經不言者何答曰其二經者三焦是陽氣之父心包絡是陰血之母也此二經尊重不繫五行所攝主受納十經血氣養育故只言十經陰陽二脈逐日各注井滎俞經合各五時辰畢則歸其本此二經亦各注井滎俞經合五穴方知十二經遍行也三焦經關衝陽井液門滎中渚俞陽池原支溝經天井合每日遇陽干合處注此六穴如甲日甲戌時至甲申時為陽干合也心包經中衝陰井勞宮滎大陵俞間使經曲澤合每日遇陰乾合處注此五穴假令甲日甲戌時膽氣初出為井己巳時脾出血為井陰陽並行陽日氣先血後陰日氣後血先己巳時至己卯時為陰乾合也餘干日辰皆依此連前共六十穴合成六十首每一穴分得一刻六十分六釐六毫六絲六忽六秒此是一穴之數六十穴合成百刻每一時辰相生養子五度各注井滎俞經合五穴晝夜十二時辰氣血行過六十俞穴也欲知人氣所在用五子元建日時現前圖可見六十首是活法依此井滎刺病甚妙五子元建日時歌甲己之日丙作首乙庚之辰戊為頭丙辛便從庚上起丁壬壬寅順行求戊癸甲寅定時候六十首法助醫流
